  <rect width="180" height="180" rx="38" fill="url(#bg)"/>
  <ellipse cx="90" cy="90" rx="72" ry="66" fill="url(#glow)"/>

  <polygon points="37,60 90,91 90,152 37,121" fill="url(#left)"/>
  <polygon points="143,60 143,121 90,152 90,91" fill="url(#right)"/>
  <polygon points="90,28 143,60 90,91 37,60" fill="url(#top)"/>
  <polygon points="90,28 143,60 90,91 37,60" fill="url(#shimmer)"/>

  <line x1="90" y1="28" x2="37"  y2="60"  stroke="#f3e8ff" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
  <line x1="90" y1="28" x2="143" y2="60"  stroke="#ddd6fe" stroke-width="0.8" opacity="0.35" stroke-linecap="round"/>
  <line x1="90" y1="28" x2="90"  y2="91"  stroke="#c4b5fd" stroke-width="0.5" opacity="0.2" stroke-linecap="round"/>
