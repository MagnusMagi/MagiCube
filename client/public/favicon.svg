<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Top face: lit from upper-left, brightest -->
    <linearGradient id="fav-top" x1="18" y1="12" x2="82" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0d4ff"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <!-- Left face: medium shadow -->
    <linearGradient id="fav-left" x1="18" y1="31" x2="50" y2="87" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <!-- Right face: deepest shadow -->
    <linearGradient id="fav-right" x1="82" y1="31" x2="50" y2="87" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#180420"/>
    </linearGradient>
  </defs>

  <!-- Left face -->
  <polygon points="18,31 50,50 50,87 18,68" fill="url(#fav-left)"/>
  <!-- Right face -->
  <polygon points="82,31 82,68 50,87 50,50" fill="url(#fav-right)"/>
  <!-- Top face (drawn last = on top) -->
  <polygon points="50,12 82,31 50,50 18,31" fill="url(#fav-top)"/>

  <!-- Top-left ridge highlight -->
  <line x1="50" y1="12" x2="18" y2="31" stroke="#e9d5ff" stroke-width="0.8" opacity="0.55" stroke-linecap="round"/>
  <!-- Top-right ridge -->
  <line x1="50" y1="12" x2="82" y2="31" stroke="#c4b5fd" stroke-width="0.5" opacity="0.3" stroke-linecap="round"/>
</svg>
